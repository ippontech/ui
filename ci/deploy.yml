publish-package:
  extends: .common-pnpm-publish
  needs:
    - build
  script:
    - pnpm config set @ippon-ui:registry https://${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/
    - pnpm config set -- //${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken ${CI_JOB_TOKEN}
    - pnpm -r publish

deploy-styles-pages:
  stage: deploy
  interruptible: true
  pages:
    publish: styles/dist/
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  needs:
    - build
  script:
    - echo "Preparing styles for GitLab Pages..."
